gpodder:
  # Base URL for the gPodder API (e.g. https://gpodder.net)
  base_url: "https://gpodder.net"
  # Initial timestamp to start fetching from (if state is empty). 0 = beginning of time.
  since_timestamp: 0

pipeline:
  # Number of episodes to process per batch. 1 = effectively sequential.
  batch_size: 5
  chunk_tokens: 12000
  chunking_threshold: 14000

paths:
  # Directory where downloaded audio files will be stored
  downloads: "data/downloads"
  # Directory where transcripts will be stored
  transcripts: "data/transcripts"
  # Directory where summaries will be stored
  summaries: "data/summaries"
  # Path to the state file (stores last processed timestamp)
  state_file: "data/state.json"
  # Path to the prompt template file
  prompt_file: "config/prompt.md"
  prompt_chunk_file: "config/prompt_chunk.md"
  prompt_final_file: "config/prompt_final.md"

llm:
  # Base URL of any OpenAI-compatible API.
  # Works with OpenAI, Ollama, vLLM, llama.cpp, Gemini (via OpenAI compat endpoint), etc.
  base_url: "http://localhost:11434"
  model: "llama3"
  # API key should be provided via .env as LLM_API_KEY when required.
  # HTTP timeout in seconds for LLM requests
  timeout: 300
  # Set to true to automatically pull missing models via Ollama's /api/pull endpoint
  auto_pull: true
  # Extra JSON fields merged into /v1/chat/completions requests.
  # Useful for backend-specific settings like context length.
  extra_body:
    options:
      num_ctx: 16384

whisper:
  # Base URL of your OpenAI-compatible Whisper server
  base_url: "http://localhost:8000"
  # Whisper model to use (e.g. "base", "small", "medium", "large-v3")
  model: "medium"
  # Credentials are loaded from .env via WHISPER_API_KEY when required.
  # Optional language hint passed to the Whisper API
  language: ""
  # Optional prompt passed to the Whisper API
  prompt: ""
  # HTTP timeout in seconds for transcription requests
  timeout: 600
