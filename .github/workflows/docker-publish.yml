name: Docker Publish

on:
  push:
    branches: [master]
    tags: ["*"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Resolve highest git tag
      id: resolve_tag
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      shell: bash
      run: |
        set -euo pipefail
        latest_tag="$(git tag --sort=-version:refname | head -n 1)"
        if [ -z "${latest_tag}" ]; then
          echo "No git tags found in repository." >&2
          exit 1
        fi
        echo "Resolved highest tag: ${latest_tag}"
        echo "tag=${latest_tag}" >> "${GITHUB_OUTPUT}"

    - name: Checkout resolved tag
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: actions/checkout@v6
      with:
        ref: ${{ steps.resolve_tag.outputs.tag }}
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=master,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          type=ref,event=tag
          type=raw,value=${{ steps.resolve_tag.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        pull: true
        no-cache: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
